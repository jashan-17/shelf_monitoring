services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shelf_monitoring_api
    env_file:
      - .env
    environment:
      MODEL_PATH: backend/models/model_v2.keras
      CORS_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
    ports:
      - "8010:8010"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: shelf_monitoring_frontend
    depends_on:
      - api
    ports:
      - "4173:80"
    restart: unless-stopped
