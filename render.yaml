services:
  - type: web
    name: shelf-monitoring-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements-deploy.txt
    startCommand: uvicorn src.api.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: DATABASE_CONNECT_TIMEOUT
        value: "10"
      - key: CORS_ORIGINS
        sync: false
      - key: MODEL_PATH
        value: backend/models/model_v2.tflite
      - key: FALLBACK_MODEL_PATH
        value: backend/models/model_v2.tflite
      - key: DEFAULT_PREDICTION_LIMIT
        value: "10"
      - key: DEFAULT_TREND_DAYS
        value: "7"
